name: Tests (macOS)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install qrencode zbar ffmpeg imagemagick

      - name: Run unit tests
        run: test/unit/run

      - name: Run functional tests
        run: test/functional/run
